name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Opt JavaScript-based actions (actions/checkout, actions/setup-node, etc.)
  # into the Node 24 runtime ahead of GitHub's full deprecation of Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
